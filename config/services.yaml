imports:
    - { resource: 'upo_rates.yaml' }

parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/*/Domain/Model/'
            - '../src/*/Domain/ValueObject/'
            - '../src/*/Domain/Exception/'
            - '../src/Kernel.php'

    # Domain repository interfaces -> Doctrine implementations
    App\TaxCalc\Domain\Repository\TaxPositionLedgerRepositoryInterface:
        alias: App\TaxCalc\Infrastructure\Doctrine\DoctrineTaxPositionLedgerRepository
        public: true

    App\Identity\Domain\Repository\UserRepositoryInterface:
        alias: App\Identity\Infrastructure\Doctrine\DoctrineUserRepository
        public: true

    App\Identity\Application\Port\MagicLinkTokenGeneratorPort:
        alias: App\Identity\Infrastructure\Security\HmacMagicLinkTokenGenerator

    App\Identity\Application\Port\MagicLinkMailerPort:
        alias: App\Identity\Infrastructure\Mailer\SymfonyMagicLinkMailer

    App\Identity\Infrastructure\Security\HmacMagicLinkTokenGenerator:
        arguments:
            $appSecret: '%env(APP_SECRET)%'

    App\Identity\Infrastructure\Controller\AuthController:
        arguments:
            $magicLinkLimiter: '@limiter.magic_link'
            $magicLinkIpLimiter: '@limiter.magic_link_ip'

    App\Identity\Infrastructure\Mailer\SymfonyMagicLinkMailer:
        arguments:
            $senderEmail: '%env(MAILER_FROM)%'

    # Exchange rate provider: cached decorator wrapping NBP API client
    App\ExchangeRate\Infrastructure\Cache\CachedExchangeRateProvider:
        arguments:
            $inner: '@App\ExchangeRate\Infrastructure\NBP\NBPApiClient'

    App\ExchangeRate\Application\Port\ExchangeRateProviderInterface:
        alias: App\ExchangeRate\Infrastructure\Cache\CachedExchangeRateProvider

    # UPO Registry: WHT rates from config
    App\TaxCalc\Domain\Service\UPORegistry:
        arguments:
            $rates: '%upo_rates%'
            $defaultRate: '%upo_default_rate%'

    # TaxCalc: query port bindings
    App\TaxCalc\Application\Port\ClosedPositionQueryPort:
        alias: App\TaxCalc\Infrastructure\Doctrine\DoctrineClosedPositionQueryAdapter

    App\TaxCalc\Application\Port\DividendResultQueryPort:
        alias: App\TaxCalc\Infrastructure\Doctrine\DoctrineDividendResultQueryAdapter

    App\TaxCalc\Application\Port\DividendResultRepositoryPort:
        alias: App\TaxCalc\Infrastructure\Doctrine\DoctrineDividendResultRepository

    App\TaxCalc\Application\Port\PriorYearLossQueryPort:
        alias: App\TaxCalc\Infrastructure\Doctrine\DoctrinePriorYearLossQueryAdapter

    # Billing: port -> adapter bindings
    App\Billing\Application\Port\PaymentGatewayPort:
        alias: App\Billing\Infrastructure\Stripe\StripePaymentGateway

    App\Billing\Application\Port\PaymentRepositoryPort:
        alias: App\Billing\Infrastructure\Doctrine\DoctrinePaymentRepository

    App\Billing\Infrastructure\Stripe\StripePaymentGateway:
        arguments:
            $stripeSecretKey: '%env(STRIPE_SECRET_KEY)%'
            $stripeWebhookSecret: '%env(STRIPE_WEBHOOK_SECRET)%'

    App\BrokerImport\Application\Port\ImportedTransactionRepositoryInterface:
        alias: App\BrokerImport\Infrastructure\Doctrine\DoctrineImportedTransactionRepository
        public: true

    App\BrokerImport\Application\Port\ImportStoragePort:
        alias: App\BrokerImport\Infrastructure\Doctrine\DoctrineImportStorageAdapter
        public: true

    App\BrokerImport\Infrastructure\Controller\ImportController:
        arguments:
            $importUploadLimiter: '@limiter.import_upload'

    App\Billing\Infrastructure\Controller\BillingController:
        arguments:
            $billingWebhookLimiter: '@limiter.billing_webhook'
