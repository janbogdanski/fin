imports:
    - { resource: 'upo_rates.yaml' }

parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/*/Domain/Model/'
            - '../src/*/Domain/ValueObject/'
            - '../src/*/Domain/Exception/'
            - '../src/Kernel.php'

    # Domain repository interfaces -> Doctrine implementations
    App\TaxCalc\Domain\Repository\TaxPositionLedgerRepositoryInterface:
        alias: App\TaxCalc\Infrastructure\Doctrine\DoctrineTaxPositionLedgerRepository
        public: true

    App\Identity\Domain\Repository\UserRepositoryInterface:
        alias: App\Identity\Infrastructure\Doctrine\DoctrineUserRepository
        public: true

    App\Identity\Application\Port\MagicLinkTokenGeneratorPort:
        alias: App\Identity\Infrastructure\Security\HmacMagicLinkTokenGenerator

    App\Identity\Application\Port\MagicLinkMailerPort:
        alias: App\Identity\Infrastructure\Mailer\SymfonyMagicLinkMailer

    App\Shared\Domain\Port\AuditLogPort:
        alias: App\Shared\Infrastructure\Audit\AuditLogger

    League\CommonMark\CommonMarkConverter:
        arguments:
            $config:
                html_input: strip
                allow_unsafe_links: false

    League\CommonMark\ConverterInterface:
        alias: League\CommonMark\CommonMarkConverter

    App\Shared\Infrastructure\Blog\MarkdownBlogRepository:
        arguments:
            $contentDir: '%kernel.project_dir%/content/blog'

    App\Shared\Infrastructure\Doctrine\EncryptionKeyInitializer:
        arguments:
            $encryptionKey: '%env(ENCRYPTION_KEY)%'

    App\Identity\Infrastructure\Security\HmacMagicLinkTokenGenerator:
        arguments:
            $appSecret: '%env(APP_SECRET)%'

    App\Identity\Infrastructure\Controller\RequestMagicLinkController:
        arguments:
            $magicLinkLimiter: '@limiter.magic_link'
            $magicLinkIpLimiter: '@limiter.magic_link_ip'

    App\Identity\Infrastructure\Mailer\SymfonyMagicLinkMailer:
        arguments:
            $senderEmail: '%env(MAILER_FROM)%'

    # Exchange rate provider: cached decorator wrapping NBP API client
    App\ExchangeRate\Infrastructure\Cache\CachedExchangeRateProvider:
        arguments:
            $inner: '@App\ExchangeRate\Infrastructure\NBP\NBPApiClient'

    App\ExchangeRate\Application\Port\ExchangeRateProviderInterface:
        alias: App\ExchangeRate\Infrastructure\Cache\CachedExchangeRateProvider

    # UPO Registry: WHT rates from config
    App\TaxCalc\Domain\Service\UPORegistry:
        arguments:
            $rates: '%upo_rates%'
            $defaultRate: '%upo_default_rate%'

    # TaxCalc: query port bindings
    App\TaxCalc\Application\Port\ClosedPositionQueryPort:
        alias: App\TaxCalc\Infrastructure\Doctrine\DoctrineClosedPositionQueryAdapter

    App\TaxCalc\Application\Port\DividendResultQueryPort:
        alias: App\TaxCalc\Infrastructure\Doctrine\DoctrineDividendResultQueryAdapter

    App\TaxCalc\Application\Port\DividendResultRepositoryPort:
        alias: App\TaxCalc\Infrastructure\Doctrine\DoctrineDividendResultRepository

    App\TaxCalc\Application\Port\PriorYearLossCrudPort:
        alias: App\TaxCalc\Infrastructure\Doctrine\PriorYearLossRepository

    App\TaxCalc\Application\Port\PriorYearLossQueryPort:
        alias: App\TaxCalc\Infrastructure\Doctrine\DoctrinePriorYearLossQueryAdapter

    # Declaration: port -> adapter bindings
    App\Declaration\Application\Port\TaxSummaryQueryPort:
        alias: App\Declaration\Infrastructure\Adapter\GetTaxSummaryAdapter

    # Billing: port -> adapter bindings
    App\Billing\Application\Port\PaymentGatewayPort:
        alias: App\Billing\Infrastructure\Stripe\StripePaymentGateway

    App\Billing\Application\Port\PaymentRepositoryPort:
        alias: App\Billing\Infrastructure\Doctrine\DoctrinePaymentRepository

    App\Billing\Infrastructure\Stripe\StripePaymentGateway:
        arguments:
            $stripeSecretKey: '%env(STRIPE_SECRET_KEY)%'
            $stripeWebhookSecret: '%env(STRIPE_WEBHOOK_SECRET)%'

    App\BrokerImport\Application\Port\ImportedTransactionRepositoryInterface:
        alias: App\BrokerImport\Infrastructure\Doctrine\DoctrineImportedTransactionRepository
        public: true

    App\BrokerImport\Application\Port\ImportStoragePort:
        alias: App\BrokerImport\Infrastructure\Doctrine\DoctrineImportStorageAdapter
        public: true

    App\BrokerImport\Application\Port\BrokerDetectorPort:
        alias: App\BrokerImport\Infrastructure\Adapter\AdapterRegistry

    App\BrokerImport\Application\Port\FifoProcessorPort:
        alias: App\TaxCalc\Application\Service\ImportToLedgerService

    App\BrokerImport\Application\Port\DividendProcessorPort:
        alias: App\TaxCalc\Application\Service\ImportDividendService

    App\BrokerImport\Infrastructure\Controller\ImportUploadController:
        arguments:
            $importUploadLimiter: '@limiter.import_upload'

    App\TaxCalc\Infrastructure\Controller\LossesStoreController:
        arguments:
            $lossesStoreLimiter: '@limiter.losses_store'

    App\Billing\Infrastructure\Controller\BillingWebhookController:
        arguments:
            $billingWebhookLimiter: '@limiter.billing_webhook'

when@test:
    services:
        # Replace the real Stripe gateway with an in-memory stub for integration tests.
        # This prevents any live Stripe API calls during the test suite.
        App\Billing\Application\Port\PaymentGatewayPort:
            alias: App\Tests\InMemory\InMemoryPaymentGatewayAdapter

        App\Tests\InMemory\InMemoryPaymentGatewayAdapter:
            public: true

        # Wire RequestMagicLinkController with tight (limit: 1) rate limiters so that
        # RateLimitingTest can exercise the rate-limit rejection code path
        # without sending 100+ requests. The tight limiters are declared in
        # rate_limiter.yaml under when@test: and do not exist in production.
        # The controller.service_arguments tag must be explicit here because
        # overriding arguments in when@test: bypasses _defaults autoconfigure.
        App\Identity\Infrastructure\Controller\RequestMagicLinkController:
            autowire: true
            autoconfigure: true
            arguments:
                $magicLinkLimiter: '@limiter.magic_link_tight'
                $magicLinkIpLimiter: '@limiter.magic_link_ip_tight'

        # The default cache.rate_limiter pool is tagged kernel.reset, which causes
        # ArrayAdapter::clear() to be called between requests — wiping limiter state.
        # The tight limiters need a dedicated ArrayAdapter that is NOT tagged
        # kernel.reset so their state survives multiple requests within one test.
        app.rate_limiter.persistent_test_cache:
            class: Symfony\Component\Cache\Adapter\ArrayAdapter
            # No kernel.reset tag: state is NOT cleared between requests.
            public: false

        app.rate_limiter.persistent_test_storage:
            class: Symfony\Component\RateLimiter\Storage\CacheStorage
            arguments:
                - '@app.rate_limiter.persistent_test_cache'
            public: false

        limiter.storage.magic_link_tight:
            class: Symfony\Component\RateLimiter\Storage\CacheStorage
            arguments:
                - '@app.rate_limiter.persistent_test_cache'
            public: false

        limiter.storage.magic_link_ip_tight:
            class: Symfony\Component\RateLimiter\Storage\CacheStorage
            arguments:
                - '@app.rate_limiter.persistent_test_cache'
            public: false
