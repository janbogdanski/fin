# P2-032: Restrictive CORS configuration.
# Deny all cross-origin requests by default.
# When API endpoints are added, whitelist specific origins here.
#
# Requires nelmio/cors-bundle: composer require nelmio/cors-bundle
# Until then, CORS is handled by Symfony's default behavior (no CORS headers = deny).
#
# Example config for future API endpoints:
# nelmio_cors:
#     defaults:
#         origin_regex: false
#         allow_origin: []
#         allow_methods: []
#         allow_headers: []
#         expose_headers: []
#         max_age: 0
#         hosts: []
#     paths:
#         '^/api/':
#             allow_origin: ['https://taxpilot.pl']
#             allow_methods: ['GET', 'POST']
#             allow_headers: ['Content-Type', 'Authorization', 'X-CSRF-Token']
#             max_age: 3600
