framework:
    rate_limiter:
        magic_link:
            policy: 'fixed_window'
            limit: 3
            interval: '10 minutes'
        magic_link_ip:
            policy: 'fixed_window'
            limit: 10
            interval: '10 minutes'
        billing_webhook:
            policy: 'sliding_window'
            limit: 60
            interval: '1 minute'
        import_upload:
            policy: 'fixed_window'
            limit: 10
            interval: '10 minutes'
        losses_store:
            policy: 'fixed_window'
            limit: 10
            interval: '10 minutes'

when@test:
    framework:
        rate_limiter:
            magic_link:
                policy: 'fixed_window'
                limit: 100
                interval: '1 minute'
            magic_link_ip:
                policy: 'fixed_window'
                limit: 100
                interval: '1 minute'
            billing_webhook:
                policy: 'fixed_window'
                limit: 1000
                interval: '1 minute'
            import_upload:
                policy: 'fixed_window'
                limit: 1000
                interval: '1 minute'
            losses_store:
                policy: 'fixed_window'
                limit: 1000
                interval: '1 minute'
            # Tight limiters used exclusively by RateLimitingTest to verify the rejection path.
            # limit: 1 means the first consume() is accepted, the second is rejected.
            magic_link_tight:
                policy: 'fixed_window'
                limit: 1
                interval: '1 day'
            magic_link_ip_tight:
                policy: 'fixed_window'
                limit: 1
                interval: '1 day'
