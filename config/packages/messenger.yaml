framework:
    messenger:
        default_bus: command.bus
        buses:
            command.bus:
                middleware:
                    - doctrine_transaction
            query.bus: ~

        failure_transport: failed

        transports:
            async:
                dsn: '%env(REDIS_URL)%/messages'
                options:
                    auto_setup: true
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
                    max_delay: 60000
            failed:
                dsn: 'doctrine://default?queue_name=failed'

        routing: {}

when@prod:
    framework:
        messenger:
            transports:
                # MyDevil shared hosting has no persistent worker/supervisor.
                # routing: {} means nothing is currently routed to async, but
                # sync:// ensures any future dispatch executes inline — zero delay,
                # no cron or worker required.
                async: 'sync://'

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
