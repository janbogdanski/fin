security:
    providers:
        app_user_provider:
            id: App\Identity\Infrastructure\Security\UserProvider

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt))/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticators:
                - App\Identity\Infrastructure\Security\MagicLinkAuthenticator
            entry_point: App\Identity\Infrastructure\Security\MagicLinkAuthenticator
            logout:
                path: auth_logout
                target: auth_login

    access_control:
        - { path: ^/(_(profiler|wdt))/,  roles: PUBLIC_ACCESS }
        - { path: ^/login,               roles: PUBLIC_ACCESS }
        - { path: ^/auth,                roles: PUBLIC_ACCESS }
        - { path: ^/health,              roles: PUBLIC_ACCESS }
        - { path: ^/billing/webhook,     roles: PUBLIC_ACCESS }
        - { path: ^/$,                   roles: PUBLIC_ACCESS }
        - { path: ^/cennik$,             roles: PUBLIC_ACCESS }
        - { path: ^/blog,                roles: PUBLIC_ACCESS }
        - { path: ^/sitemap\.xml$,       roles: PUBLIC_ACCESS }
        - { path: ^/,                    roles: ROLE_USER }

when@test:
    security:
        firewalls:
            main:
                security: false
