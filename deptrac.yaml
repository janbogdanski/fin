deptrac:
  paths:
    - ./src

  layers:
    # === Warstwy architektoniczne ===
    - name: SharedDomain
      collectors:
        - type: directory
          value: src/Shared/Domain/.*

    - name: SharedInfrastructure
      collectors:
        - type: directory
          value: src/Shared/Infrastructure/.*

    - name: TaxCalcDomain
      collectors:
        - type: directory
          value: src/TaxCalc/Domain/.*

    - name: TaxCalcApplication
      collectors:
        - type: directory
          value: src/TaxCalc/Application/.*

    - name: TaxCalcInfrastructure
      collectors:
        - type: directory
          value: src/TaxCalc/Infrastructure/.*

    - name: BrokerImportDomain
      collectors:
        - type: directory
          value: src/BrokerImport/Domain/.*

    - name: BrokerImportApplication
      collectors:
        - type: directory
          value: src/BrokerImport/Application/.*

    - name: BrokerImportInfrastructure
      collectors:
        - type: directory
          value: src/BrokerImport/Infrastructure/.*

    - name: ExchangeRateDomain
      collectors:
        - type: directory
          value: src/ExchangeRate/Domain/.*

    - name: ExchangeRateApplication
      collectors:
        - type: directory
          value: src/ExchangeRate/Application/.*

    - name: ExchangeRateInfrastructure
      collectors:
        - type: directory
          value: src/ExchangeRate/Infrastructure/.*

    - name: IdentityDomain
      collectors:
        - type: directory
          value: src/Identity/Domain/.*

    - name: IdentityApplication
      collectors:
        - type: directory
          value: src/Identity/Application/.*

    - name: IdentityInfrastructure
      collectors:
        - type: directory
          value: src/Identity/Infrastructure/.*

    - name: DeclarationDomain
      collectors:
        - type: directory
          value: src/Declaration/Domain/.*

    - name: BillingDomain
      collectors:
        - type: directory
          value: src/Billing/Domain/.*

    - name: BillingApplication
      collectors:
        - type: directory
          value: src/Billing/Application/.*

    - name: BillingInfrastructure
      collectors:
        - type: directory
          value: src/Billing/Infrastructure/.*

    - name: DeclarationInfrastructure
      collectors:
        - type: directory
          value: src/Declaration/Infrastructure/.*

    # === Vendor layers (domain-safe vs infrastructure-only) ===

    # Brick\Math is a pure value-object library, safe for domain use
    - name: VendorBrickMath
      collectors:
        - type: classNameRegex
          value: '#^Brick\\Math\\#'

    # Symfony\Component\Uid is a domain-safe value object (UUID)
    - name: VendorSymfonyUid
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\Component\\Uid\\#'

    # Symfony framework classes (HTTP, Routing, Security, Cache, Mailer, RateLimiter, Bundle)
    - name: VendorSymfonyFramework
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\(Component\\(HttpFoundation|Routing|Security|Mailer|Mime|RateLimiter)\\|Bundle\\|Contracts\\)#'

    # Twig template engine
    - name: VendorTwig
      collectors:
        - type: classNameRegex
          value: '#^Twig\\#'

    # PSR interfaces (Clock, Cache, Log, etc.)
    - name: VendorPsr
      collectors:
        - type: classNameRegex
          value: '#^Psr\\#'

    # Doctrine ORM/DBAL
    - name: VendorDoctrine
      collectors:
        - type: classNameRegex
          value: '#^Doctrine\\#'

    # Stripe SDK
    - name: VendorStripe
      collectors:
        - type: classNameRegex
          value: '#^Stripe\\#'

    # League CommonMark (Markdown parser for blog)
    - name: VendorCommonmark
      collectors:
        - type: classNameRegex
          value: '#^League\\CommonMark\\#'

  ruleset:
    # === Vendor layers have no outgoing dependencies to track ===
    VendorBrickMath: ~
    VendorSymfonyUid: ~
    VendorSymfonyFramework: ~
    VendorDoctrine: ~
    VendorTwig: ~
    VendorPsr: ~
    VendorStripe: ~
    VendorCommonmark: ~

    # === Domain layers: may depend on domain-safe vendor libs ===
    SharedInfrastructure:
      - SharedDomain
      - BillingDomain  # UserSubscriptionExtension uses ProductCode
      - BillingApplication  # UserSubscriptionExtension uses PaymentRepositoryPort
      - IdentityInfrastructure  # UserSubscriptionExtension uses SecurityUser
      - VendorBrickMath  # MoneyAmountType uses BigDecimal
      - VendorSymfonyFramework
      - VendorTwig
      - VendorDoctrine
      - VendorCommonmark

    SharedDomain:
      - VendorBrickMath
      - VendorSymfonyUid

    TaxCalcDomain:
      - SharedDomain
      - VendorBrickMath

    TaxCalcApplication:
      - TaxCalcDomain
      - BrokerImportApplication  # ImportToLedgerService consumes NormalizedTransaction DTOs
      - ExchangeRateApplication  # ImportToLedgerService uses ExchangeRateProviderInterface for NBP rates
      - SharedDomain
      - VendorBrickMath
      - VendorPsr  # LoggerInterface for reconciliation logging in ImportToLedgerService

    TaxCalcInfrastructure:
      - TaxCalcApplication
      - TaxCalcDomain
      - BrokerImportApplication  # Dashboard uses ImportedTransactionRepositoryInterface
      - IdentityInfrastructure  # SecurityUser for controllers
      - SharedDomain
      - VendorBrickMath
      - VendorSymfonyUid  # PriorYearLossRepository generates UUIDv7 for new loss records
      - VendorSymfonyFramework
      - VendorTwig
      - VendorPsr
      - VendorDoctrine

    BrokerImportDomain:
      - SharedDomain
      - VendorBrickMath

    BrokerImportApplication:
      - BrokerImportDomain
      - TaxCalcApplication  # ConfirmImportHandler uses ImportToLedgerService
      - TaxCalcDomain  # ConfirmImportHandler uses TaxYear
      - SharedDomain
      - VendorBrickMath
      - VendorSymfonyUid  # ConfirmImportHandler generates batch UUIDs

    BrokerImportInfrastructure:
      - BrokerImportApplication
      - BrokerImportDomain
      - TaxCalcApplication  # ImportController triggers FIFO matching via ImportToLedgerService
      - TaxCalcDomain  # ImportController uses TaxYear
      - IdentityInfrastructure  # SecurityUser for controller
      - SharedDomain
      - VendorBrickMath
      - VendorSymfonyUid
      - VendorSymfonyFramework
      - VendorTwig
      - VendorPsr
      - VendorDoctrine  # DoctrineImportedTransactionRepository + DoctrineImportStorageAdapter

    ExchangeRateDomain:
      - SharedDomain

    ExchangeRateApplication:
      - ExchangeRateDomain
      - SharedDomain

    ExchangeRateInfrastructure:
      - ExchangeRateApplication
      - ExchangeRateDomain
      - SharedDomain
      - VendorBrickMath
      - VendorSymfonyFramework
      - VendorTwig
      - VendorPsr

    IdentityDomain:
      - SharedDomain

    IdentityApplication:
      - IdentityDomain
      - SharedDomain

    IdentityInfrastructure:
      - IdentityApplication
      - IdentityDomain
      - SharedDomain
      - VendorSymfonyFramework
      - VendorTwig
      - VendorPsr
      - VendorDoctrine

    BillingDomain:
      - SharedDomain
      - VendorSymfonyUid

    BillingApplication:
      - BillingDomain
      - SharedDomain
      - VendorPsr

    BillingInfrastructure:
      - BillingApplication
      - BillingDomain
      - SharedDomain
      - VendorSymfonyFramework
      - VendorStripe
      - VendorDoctrine
      - VendorPsr
      - IdentityInfrastructure  # SecurityUser for controller

    DeclarationDomain:
      - SharedDomain
      - TaxCalcDomain  # Customer-Supplier: Declaration consumes TaxCalc data (ClosedPosition, DividendTaxResult)
      - VendorBrickMath

    DeclarationInfrastructure:
      - DeclarationDomain
      - TaxCalcDomain
      - TaxCalcApplication  # Controller uses GetTaxSummaryHandler + TaxSummaryResult DTOs
      - BrokerImportApplication  # DeclarationController uses ImportedTransactionRepositoryInterface
      - BillingDomain  # Value gate: TierResolver + UserTier
      - BillingApplication  # Value gate: PaymentRepositoryPort
      - SharedDomain
      - IdentityInfrastructure  # SecurityUser for controller
      - VendorBrickMath  # AuditReportDataBuilder uses BigDecimal for totals calculation
      - VendorSymfonyFramework
      - VendorTwig
      - VendorPsr
