services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/app
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=dev
      - APP_DEBUG=1
      - APP_SECRET=dev-only-secret-change-in-production
      - DATABASE_URL=postgresql://taxpilot:taxpilot@postgres:5432/taxpilot?serverVersion=17
      - REDIS_URL=redis://redis:6379
      - ENCRYPTION_KEY=dev-only-key-replace-in-production-32b
      - NIP_HMAC_KEY=dev-only-hmac-key-replace-in-prod-32b
      - MAILER_DSN=smtp://mailpit:1025
    healthcheck:
      test: ["CMD-SHELL", "php -r \"@fsockopen('localhost', 8080) || exit(1);\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: taxpilot
      POSTGRES_USER: taxpilot
      POSTGRES_PASSWORD: taxpilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxpilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  messenger-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: php bin/console messenger:consume async --time-limit=3600 --memory-limit=256M -vv
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=dev
      - APP_DEBUG=1
      - APP_SECRET=dev-only-secret-change-in-production
      - DATABASE_URL=postgresql://taxpilot:taxpilot@postgres:5432/taxpilot?serverVersion=17
      - REDIS_URL=redis://redis:6379
      - ENCRYPTION_KEY=dev-only-key-replace-in-production-32b
      - NIP_HMAC_KEY=dev-only-hmac-key-replace-in-prod-32b
      - MAILER_DSN=smtp://mailpit:1025
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit
    ports:
      - "8026:8025"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/"]
      interval: 15s
      timeout: 5s
      retries: 3

  pact-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pact_broker
      POSTGRES_USER: pact_broker
      POSTGRES_PASSWORD: pact_broker
    volumes:
      - pact_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pact_broker"]
      interval: 5s
      timeout: 5s
      retries: 5

  pact-broker:
    image: pactfoundation/pact-broker:latest
    ports:
      - "9292:9292"
    depends_on:
      pact-postgres:
        condition: service_healthy
    environment:
      PACT_BROKER_DATABASE_URL: postgres://pact_broker:pact_broker@pact-postgres/pact_broker
      PACT_BROKER_BASIC_AUTH_USERNAME: ""
      PACT_BROKER_BASIC_AUTH_PASSWORD: ""
      PACT_BROKER_ALLOW_PUBLIC_READ: "true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9292/diagnostic/status/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
  pact_postgres_data:
