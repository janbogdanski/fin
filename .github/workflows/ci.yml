name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  APP_ENV: test
  APP_SECRET: ci-secret-not-real
  DATABASE_URL: postgresql://app:secret@localhost:5432/app?serverVersion=17
  ENCRYPTION_KEY: ECGwhE+E+D3NPxZyjYn+F7DwZ8Qks4XVi/Ny6AsAkfU= # CI-ONLY — test key, never reuse in any other environment
  NIP_HMAC_KEY: dGVzdC1vbmx5LWhtYWMta2V5LWZvci10ZXN0cw== # CI-ONLY — test key, never reuse in any other environment
  REDIS_URL: redis://localhost:6379
  MAILER_DSN: null://null

jobs:
  stage-1-lint-stan-unit:
    name: "Stage 1: Lint + PHPStan + Unit + Functional Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: app_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="psql -U app -d app_test -c 'SELECT 1'"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_pgsql, intl, sodium, opcache, bcmath, calendar, zip, ffi, redis
          tools: composer:v2
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: ADR Drift Detection
        run: |
          chmod +x bin/check-adr-drift.sh
          bash bin/check-adr-drift.sh

      - name: Run ECS (lint)
        run: vendor/bin/ecs check

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --level=max --no-progress

      - name: Run Deptrac
        run: vendor/bin/deptrac --no-progress

      - name: Check for untyped @return array in Application/Domain
        run: |
          VIOLATIONS=$(grep -rEn "@return array($|[^{<])" src/*/Application/ src/*/Domain/ --include="*.php" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Bare '@return array' found in Application or Domain layer."
            echo "Use typed shapes (@return array{key: Type}) or typed generics (@return array<K, V>) instead."
            echo ""
            echo "Violations:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "No untyped @return array found. All clear."

      - name: Run unit tests
        run: php vendor/bin/phpunit --testsuite=unit --no-progress

      - name: Run functional tests
        run: php vendor/bin/phpunit --testsuite=functional --no-progress

  stage-2-integration:
    name: "Stage 2: Integration + Golden + Property + Contract + Mutation"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: stage-1-lint-stan-unit

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: app_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="psql -U app -d app_test -c 'SELECT 1'"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_pgsql, intl, sodium, opcache, bcmath, calendar, zip, ffi, redis
          tools: composer:v2
          coverage: xdebug

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction

      - name: Run integration tests
        run: php vendor/bin/phpunit --testsuite=integration --no-progress

      - name: Run golden dataset tests
        run: php vendor/bin/phpunit --testsuite=golden-dataset --no-progress

      - name: Run property tests
        run: php vendor/bin/phpunit --testsuite=property --no-progress

      - name: Run contract tests
        run: php vendor/bin/phpunit --testsuite=contract --no-progress

      - name: Run repository contract tests
        run: php vendor/bin/phpunit --testsuite=repository-contract --no-progress

      - name: Run Infection (mutation testing)
        run: php vendor/bin/infection --threads=4 --no-progress --logger-text=infection.log
        continue-on-error: false

  # Stage 3 runs in parallel with Stage 2 (both depend on Stage 1).
  # Intentional: security/smoke/e2e tests do not depend on integration test results —
  # they only require lint+stan+unit to pass. Parallel execution saves ~2 min on each CI run.
  # If Stage 2 results must gate Stage 3, change needs to [stage-2-integration].
  stage-3-security-smoke:
    name: "Stage 3: Security + Smoke + E2E Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: stage-1-lint-stan-unit

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: app_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="psql -U app -d app_test -c 'SELECT 1'"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_pgsql, intl, sodium, opcache, bcmath, calendar, zip, ffi, redis
          tools: composer:v2
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction

      - name: Run security tests
        run: php vendor/bin/phpunit --testsuite=integration --group=security --no-progress

      - name: Run E2E tests
        run: php vendor/bin/phpunit --testsuite=e2e --no-progress

      - name: Composer audit
        run: composer audit
